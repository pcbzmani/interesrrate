<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const CFG = {
  get url()      { return localStorage.getItem('lt_api_url') || ''; },
  set url(v)     { localStorage.setItem('lt_api_url', v); },
  get currency() { return localStorage.getItem('lt_currency') || '₹'; },
  set currency(v){ localStorage.setItem('lt_currency', v); },
  get demoMode() { return !this.url; }
};

let STATE = {
  view: 'dashboard',
  borrowers: [],
  summary: null,
  currentBorrowerId: null,
  filterTab: 'all',
  searchQuery: '',
  chart1: null,
  chart2: null
};

// ══════════════════════════════════════════════════════════
// DEMO DATA — starts empty, works like real mode
// ══════════════════════════════════════════════════════════
let DEMO_BORROWERS = [];
let DEMO_TXNS      = {};
let DEMO_SUMMARY   = {
  totalPrincipal:0, totalOutstanding:0, totalCollected:0, totalInterest:0,
  activeBorrowers:0, closedBorrowers:0, overdueBorrowers:0, totalBorrowers:0
};

function recalcDemoSummary() {
  const active  = DEMO_BORROWERS.filter(b => b.Status === 'ACTIVE');
  const closed  = DEMO_BORROWERS.filter(b => b.Status === 'CLOSED');
  const overdue = DEMO_BORROWERS.filter(b => b.isOverdue);
  DEMO_SUMMARY.totalPrincipal   = DEMO_BORROWERS.reduce((s,b) => s + (b.Principal||0), 0);
  DEMO_SUMMARY.totalOutstanding = active.reduce((s,b) => s + (b.outstanding||0), 0);
  DEMO_SUMMARY.totalCollected   = DEMO_BORROWERS.reduce((s,b) => s + (b.paid||0), 0);
  DEMO_SUMMARY.totalInterest    = DEMO_BORROWERS.reduce((s,b) => s + (b.stats?.totalInterest||0), 0);
  DEMO_SUMMARY.activeBorrowers  = active.length;
  DEMO_SUMMARY.closedBorrowers  = closed.length;
  DEMO_SUMMARY.overdueBorrowers = overdue.length;
  DEMO_SUMMARY.totalBorrowers   = DEMO_BORROWERS.length;
}

// ══════════════════════════════════════════════════════════
// API — real or demo
// ══════════════════════════════════════════════════════════
async function apiGet(action, params = {}) {
  if (CFG.demoMode) return demoGet(action, params);
  const url = new URL(CFG.url);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return d;
}

async function apiPost(data) {
  if (CFG.demoMode) return demoPost(data);
  const res = await fetch(CFG.url, {
    method: 'POST', redirect: 'follow',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(data)
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return d;
}

function demoGet(action, params) {
  switch(action) {
    case 'getBorrowers':      return JSON.parse(JSON.stringify(DEMO_BORROWERS));
    case 'getSummary':        return JSON.parse(JSON.stringify(DEMO_SUMMARY));
    case 'getTransactions':   return JSON.parse(JSON.stringify(DEMO_TXNS[params.id] || []));
    case 'getAllTransactions': return Object.values(DEMO_TXNS).flat();
    case 'ping':              return {ok:true};
    default:                  return {};
  }
}

function demoPost(data) {
  const {action} = data;

  if (action === 'addBorrower') {
    const b   = data.borrower;
    const id  = 'D' + Date.now();
    const stats = calcStats(parseFloat(b.principal), parseFloat(b.interestRate),
                            parseInt(b.months), b.interestType, b.rateUnit);
    const newB = {
      ID: id, Name: b.name, Phone: b.phone||'', Principal: parseFloat(b.principal),
      InterestRate: parseFloat(b.interestRate), Months: parseInt(b.months),
      StartDate: b.startDate, InterestType: b.interestType||'EMI', RateUnit: b.rateUnit||'PA',
      Status: 'ACTIVE', Notes: b.notes||'',
      outstanding: parseFloat(b.principal), paid: 0, isOverdue: false, stats
    };
    DEMO_BORROWERS.push(newB);
    DEMO_TXNS[id] = [{
      ID: 'T'+Date.now(), BorrowerID: id, Date: b.startDate,
      Type: 'DISBURSEMENT', Amount: parseFloat(b.principal),
      Description: 'Loan disbursement', RunningBalance: parseFloat(b.principal)
    }];
    recalcDemoSummary();
    return {success:true, id};
  }

  if (action === 'recordPayment') {
    const idx = DEMO_BORROWERS.findIndex(x => x.ID === data.borrowerId);
    if (idx < 0) return {error:'Not found'};
    const amt = parseFloat(data.amount);
    const b   = DEMO_BORROWERS[idx];
    b.paid += amt;
    b.outstanding = Math.max(0, b.outstanding - amt);
    if (b.outstanding < 0.01) b.Status = 'CLOSED';
    if (!DEMO_TXNS[data.borrowerId]) DEMO_TXNS[data.borrowerId] = [];
    DEMO_TXNS[data.borrowerId].push({
      ID:'T'+Date.now(), BorrowerID:data.borrowerId,
      Date: data.date||today(), Type:'PAYMENT', Amount:amt,
      Description: data.description||'Payment', RunningBalance: b.outstanding
    });
    recalcDemoSummary();
    return {success:true, newBalance:b.outstanding};
  }

  if (action === 'recordTransfer') {
    const fi = DEMO_BORROWERS.findIndex(x => x.ID === data.fromBorrowerId);
    const ti = DEMO_BORROWERS.findIndex(x => x.ID === data.toBorrowerId);
    if (fi<0||ti<0) return {error:'Not found'};
    const amt = parseFloat(data.amount);
    const fb = DEMO_BORROWERS[fi], tb = DEMO_BORROWERS[ti];
    fb.paid += amt; fb.outstanding = Math.max(0, fb.outstanding - amt);
    tb.outstanding += amt;
    if (!DEMO_TXNS[data.fromBorrowerId]) DEMO_TXNS[data.fromBorrowerId]=[];
    if (!DEMO_TXNS[data.toBorrowerId])   DEMO_TXNS[data.toBorrowerId]=[];
    DEMO_TXNS[data.fromBorrowerId].push({ID:'T'+Date.now(), BorrowerID:data.fromBorrowerId,
      Date:data.date||today(), Type:'PAYMENT', Amount:amt, Description:'Transfer to '+tb.Name, RunningBalance:fb.outstanding});
    DEMO_TXNS[data.toBorrowerId].push({ID:'T'+(Date.now()+1), BorrowerID:data.toBorrowerId,
      Date:data.date||today(), Type:'DISBURSEMENT', Amount:amt, Description:'Transfer from '+fb.Name, RunningBalance:tb.outstanding});
    recalcDemoSummary();
    return {success:true};
  }

  if (action === 'updateBorrower') {
    const idx = DEMO_BORROWERS.findIndex(x => x.ID === data.borrower.ID);
    if (idx >= 0) {
      const b = DEMO_BORROWERS[idx];
      Object.assign(b, data.borrower);
      b.stats = calcStats(b.Principal, b.InterestRate, b.Months, b.InterestType, b.RateUnit);
      recalcDemoSummary();
    }
    return {success:true};
  }

  if (action === 'deleteBorrower') {
    const idx = DEMO_BORROWERS.findIndex(x => x.ID === data.id);
    if (idx >= 0) DEMO_BORROWERS.splice(idx, 1);
    recalcDemoSummary();
    return {success:true};
  }

  if (action === 'closeLoan') {
    const b = DEMO_BORROWERS.find(x => x.ID === data.id);
    if (b) b.Status = 'CLOSED';
    recalcDemoSummary();
    return {success:true};
  }

  return {success:true};
}

// ══════════════════════════════════════════════════════════
// INTEREST RATE UTILITIES
// ══════════════════════════════════════════════════════════

// Returns decimal monthly rate regardless of input unit
// PA=% p.a. | PM=% p.m. | PAISE=paise/₹/month | PER100=₹/₹100/month
function toMonthlyRate(rate, unit) {
  const r = parseFloat(rate) || 0;
  switch(unit) {
    case 'PM':     return r / 100;
    case 'PAISE':  return r / 100;   // 1 paise/₹ = 1% per month
    case 'PER100': return r / 100;   // ₹1/₹100 = 1% per month
    default:       return r / 12 / 100; // PA
  }
}

// Human-readable label for a rate+unit combo
function formatRate(rate, unit) {
  const r = parseFloat(rate) || 0;
  switch(unit) {
    case 'PM':     return `${r}% p.m.`;
    case 'PAISE':  return `${r} paise/₹/mo`;
    case 'PER100': return `${CFG.currency}${r}/₹100/mo`;
    default:       return `${r}% p.a.`;
  }
}

// Equivalent string shown next to the rate input
function rateEquivText(rate, unit) {
  const r  = parseFloat(rate);
  if (!r && r !== 0) return 'Enter rate above to see equivalent';
  const rm = toMonthlyRate(r, unit) * 100; // monthly %
  const ra = rm * 12;                       // annual %
  switch(unit) {
    case 'PM':
      return `${r}% per month = ${ra.toFixed(2)}% p.a. = ${r} paise per ₹ per month`;
    case 'PAISE':
      return `${r} paise/₹/month = ${rm.toFixed(3)}% per month = ${ra.toFixed(2)}% p.a.`;
    case 'PER100':
      return `${CFG.currency}${r}/₹100/month = ${rm.toFixed(3)}% per month = ${ra.toFixed(2)}% p.a.`;
    default:
      return `${r}% p.a. = ${rm.toFixed(3)}% per month = ${rm.toFixed(3)} paise/₹/month`;
  }
}

// ══════════════════════════════════════════════════════════
// LOAN MATH
// ══════════════════════════════════════════════════════════
function calcStats(principal, rate, months, loanType, rateUnit) {
  const p = parseFloat(principal) || 0;
  const m = parseInt(months) || 0;
  if (!p || !m) return {monthlyPayment:0, totalInterest:0, totalRepayable:p};

  const r = toMonthlyRate(rate, rateUnit || 'PA');
  let monthly, interest;

  switch(loanType) {
    case 'SIMPLE':
      interest = p * r * m;
      monthly  = (p + interest) / m;
      break;
    case 'FLAT':
      monthly  = (p / m) + (p * r);
      interest = monthly * m - p;
      break;
    case 'INTEREST_ONLY':
      monthly  = p * r;
      interest = monthly * m;
      break;
    default: // EMI — reducing balance
      monthly  = r === 0 ? p/m : p*r*Math.pow(1+r,m)/(Math.pow(1+r,m)-1);
      interest = monthly * m - p;
  }

  return {
    monthlyPayment: r2(monthly),
    totalInterest:  r2(Math.max(0, interest)),
    totalRepayable: r2(p + Math.max(0, interest))
  };
}

function generateSchedule(principal, rate, months, startDate, loanType, rateUnit) {
  const p    = parseFloat(principal) || 0;
  const m    = parseInt(months) || 0;
  const r    = toMonthlyRate(rate, rateUnit || 'PA');
  const start= new Date(startDate || today());
  let balance = p;
  const rows  = [];

  for (let i = 1; i <= m; i++) {
    const d = new Date(start);
    d.setMonth(d.getMonth() + i);

    let interestPart, principalPart, payment;

    switch(loanType) {
      case 'SIMPLE':
      case 'FLAT': {
        const s = calcStats(p, rate, m, loanType, rateUnit);
        payment      = s.monthlyPayment;
        interestPart = p * r;
        principalPart= payment - interestPart;
        break;
      }
      case 'INTEREST_ONLY':
        interestPart  = p * r;
        principalPart = (i === m) ? balance : 0;
        payment       = interestPart + principalPart;
        break;
      default: // EMI
        interestPart  = balance * r;
        const emi     = r===0 ? p/m : p*r*Math.pow(1+r,m)/(Math.pow(1+r,m)-1);
        principalPart = emi - interestPart;
        payment       = emi;
    }

    balance = Math.max(0, balance - principalPart);
    rows.push({
      month:i, date:d.toISOString().split('T')[0],
      payment:r2(payment), principal:r2(principalPart),
      interest:r2(interestPart), balance:r2(balance),
      isPast: d < new Date()
    });
  }
  return rows;
}

// ══════════════════════════════════════════════════════════
// FORMATTERS
// ══════════════════════════════════════════════════════════
function r2(n)    { return Math.round((parseFloat(n)||0)*100)/100; }
function fmt(n)   {
  const v = parseFloat(n)||0;
  if (v>=10000000) return CFG.currency+(v/10000000).toFixed(2)+'Cr';
  if (v>=100000)   return CFG.currency+(v/100000).toFixed(2)+'L';
  if (v>=1000)     return CFG.currency+(v/1000).toFixed(1)+'K';
  return CFG.currency+v.toFixed(0);
}
function fmtFull(n){
  return CFG.currency+(parseFloat(n)||0).toLocaleString('en-IN',{maximumFractionDigits:0});
}
function fmtDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function today() { return new Date().toISOString().split('T')[0]; }
function pct(a,b){ return (!b)?0:Math.min(100,Math.max(0,Math.round(parseFloat(a)/parseFloat(b)*100))); }

function navigate(view, params={}) {
  STATE.view = view;
  if (params.id) STATE.currentBorrowerId = params.id;
  updateNav(view);
  renderView();
  closeSidebar();
}

function updateNav(view) {
  ['dashboard','borrowers','add','transfers','settings'].forEach(v => {
    document.getElementById('nav-'+v)?.classList.toggle('active', v===view);
    document.getElementById('mnav-'+v)?.classList.toggle('active', v===view);
  });
  const titles = {
    dashboard:  ['📊 Dashboard',   'Portfolio overview'],
    borrowers:  ['👥 Borrowers',   'All loans'],
    add:        ['➕ Add Borrower','New loan'],
    edit:       ['✏️ Edit Borrower','Update loan'],
    detail:     ['👤 Profile',     ''],
    transfers:  ['🔄 Transfers',   'P2P debt movement'],
    settings:   ['⚙️ Settings',    'Configure app']
  };
  const t = titles[view]||['Asaktivatti',''];
  document.getElementById('breadcrumb').innerHTML =
    `<strong style="color:#0f172a">${t[0]}</strong>${t[1]?` <span style="color:#cbd5e1">›</span> ${t[1]}`:''}`;
}

async function renderView() {
  document.getElementById('content').innerHTML = '<div class="loading-spinner"></div>';
  try {
    switch(STATE.view) {
      case 'dashboard':  await renderDashboard(); break;
      case 'borrowers':  await renderBorrowers(); break;
      case 'detail':     await renderDetail(STATE.currentBorrowerId); break;
      case 'add':        renderAddForm(null); break;
      case 'edit':       renderAddForm(STATE.currentBorrowerId); break;
      case 'transfers':  await renderTransfers(); break;
      case 'settings':   renderSettings(); break;
    }
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p style="margin-bottom:16px">${e.message}</p>
        <button class="btn btn-primary" onclick="renderView()">Retry</button>
      </div>`;
  }
}

function loanTypeLabel(t) {
  return {EMI:'EMI (Reducing Balance)',SIMPLE:'Simple Interest',FLAT:'Flat Rate',INTEREST_ONLY:'Interest Only (Bullet)'}[t]||t;
}

function loanTypeDesc(t) {
  return {
    EMI:           'Equal monthly EMIs. Interest on reducing balance. Bank standard. Best for borrowers.',
    SIMPLE:        'Interest = P × R × T. Fixed total interest. Common for short informal loans.',
    FLAT:          'Monthly interest on full principal + equal principal. Higher effective rate than EMI.',
    INTEREST_ONLY: 'Pay only interest each month; full principal at end. Best for business/bridge loans.'
  }[t]||'';
}

function updateTypeDesc() {
  const t = document.getElementById('f-type')?.value;
  const el = document.getElementById('type-desc');
  if (el && t) el.textContent = loanTypeDesc(t);
}

function onRateChange() {
  const rate = document.getElementById('f-rate')?.value;
  const unit = document.getElementById('f-rate-unit')?.value;
  const el   = document.getElementById('rate-equiv');
  if (el) el.textContent = rateEquivText(rate, unit);
  toggleRateTable(unit);
  updatePreview();
}

function toggleRateTable(unit) {
  const el = document.getElementById('rate-table');
  if (el) el.style.display = (unit==='PAISE'||unit==='PER100'||unit==='PM') ? 'block' : 'none';
}

function updatePreview() {
  const p    = parseFloat(document.getElementById('f-principal')?.value);
  const r    = parseFloat(document.getElementById('f-rate')?.value) || 0;
  const m    = parseInt(document.getElementById('f-months')?.value);
  const t    = document.getElementById('f-type')?.value || 'EMI';
  const unit = document.getElementById('f-rate-unit')?.value || 'PA';

  updateTypeDesc();

  if (!p || !m) {
    document.getElementById('preview-empty')?.style && (document.getElementById('preview-empty').style.display='block');
    document.getElementById('preview-data')?.style   && (document.getElementById('preview-data').style.display='none');
    return;
  }

  const stats    = calcStats(p, r, m, t, unit);
  const monthlyR = toMonthlyRate(r, unit)*100;
  const annualR  = monthlyR * 12;

  const set = (id, v) => { const el=document.getElementById(id); if(el) el.innerHTML=v; };
  set('pv-monthly',   fmtFull(stats.monthlyPayment)+'/mo');
  set('pv-principal', fmtFull(p));
  set('pv-interest',  fmtFull(stats.totalInterest));
  set('pv-effrate',   monthlyR.toFixed(3)+'% p.m. / '+annualR.toFixed(2)+'% p.a.');
  set('pv-total',     fmtFull(stats.totalRepayable));

  document.getElementById('preview-empty')&&(document.getElementById('preview-empty').style.display='none');
  document.getElementById('preview-data')&&(document.getElementById('preview-data').style.display='block');
}

async function submitBorrower() {
  const name  = document.getElementById('f-name')?.value?.trim();
  const p     = parseFloat(document.getElementById('f-principal')?.value);
  const r     = parseFloat(document.getElementById('f-rate')?.value) || 0;
  const m     = parseInt(document.getElementById('f-months')?.value);
  const start = document.getElementById('f-start')?.value;
  const type  = document.getElementById('f-type')?.value;
  const unit  = document.getElementById('f-rate-unit')?.value || 'PA';

  if (!name)              { showToast('Name is required','error'); return; }
  if (!p || p<=0)         { showToast('Enter a valid principal amount','error'); return; }
  if (!m || m<=0)         { showToast('Enter duration in months','error'); return; }
  if (!start)             { showToast('Select a start date','error'); return; }

  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled=true; btn.textContent='Adding…'; }

  try {
    const res = await apiPost({
      action: 'addBorrower',
      borrower: {
        name, phone: document.getElementById('f-phone')?.value?.trim()||'',
        principal:p, interestRate:r, months:m, startDate:start,
        interestType:type, rateUnit:unit,
        notes: document.getElementById('f-notes')?.value?.trim()||''
      }
    });
    showToast('Borrower added! 🎉','success');
    STATE.borrowers = await apiGet('getBorrowers');
    navigate('detail', {id:res.id});
  } catch(e) {
    showToast(e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='➕ Add Borrower'; }
  }
}

async function saveEdit(id) {
  const b = STATE.borrowers.find(x=>x.ID===id);
  if (!b) return;
  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  try {
    await apiPost({
      action: 'updateBorrower',
      borrower: {
        ID: id,
        Name:         document.getElementById('f-name').value.trim(),
        Phone:        document.getElementById('f-phone').value.trim(),
        InterestRate: parseFloat(document.getElementById('f-rate').value)||0,
        RateUnit:     document.getElementById('f-rate-unit').value||'PA',
        Months:       parseInt(document.getElementById('f-months').value),
        InterestType: document.getElementById('f-type').value,
        Status:       b.Status,
        Notes:        document.getElementById('f-notes').value.trim()
      }
    });
    showToast('Saved','success');
    STATE.borrowers = await apiGet('getBorrowers');
    navigate('detail',{id});
  } catch(e) {
    showToast(e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='💾 Save Changes'; }
  }
}

          </select>

        <div style="margin-bottom:14px">
          <label class="label">Amount (${CFG.currency}) *</label>

        </div>

        <div style="margin-bottom:14px">
          <label class="label">Date</label>
          <input class="input" id="tr-date" type="date" value="${today()}">
        </div>

        <div style="margin-bottom:16px">
          <label class="label">Notes</label>
          <input class="input" id="tr-notes" placeholder="Reason for transfer…">
        </div>

        <div id="tr-preview" style="display:none;background:#eff6ff;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px">
          <div style="font-weight:600;color:#1d4ed8;margin-bottom:8px">What will happen:</div>
          <div id="tr-preview-body"></div>
        </div>

        <button class="btn btn-primary" style="width:100%" id="tr-btn" onclick="submitTransfer()">🔄 Execute Transfer</button>
      </div>

      <div class="card" style="padding:24px">
        <div style="font-weight:600;margin-bottom:12px">ℹ️ How Transfers Work</div>
        <div style="font-size:13px;color:#64748b;line-height:1.7">
          <p>A transfer reallocates debt obligation between borrowers:</p>
          <div style="background:#f8fafc;border-radius:8px;padding:12px;margin:10px 0">
            <strong>Example:</strong> Ramesh owes you ₹50,000. He pays ₹15,000 directly to Suresh on your behalf.
            <ul style="margin-top:8px;padding-left:16px">
              <li>Ramesh's debt: ₹50,000 → ₹35,000 ✅</li>
              <li>Suresh's debt: increases by ₹15,000 📈</li>
            </ul>
          </div>
          <p><strong>Real-world uses:</strong></p>
          <ul style="padding-left:16px">
            <li>One borrower repays through another</li>

function updateTransferPreview() {
  const fid = document.getElementById('tr-from')?.value;
  const tid = document.getElementById('tr-to')?.value;
  const amt = parseFloat(document.getElementById('tr-amount')?.value)||0;
  const el  = document.getElementById('tr-preview');
  const body= document.getElementById('tr-preview-body');
  if (!fid||!tid||!amt||fid===tid){if(el)el.style.display='none';return;}
  const fb  = STATE.borrowers.find(b=>b.ID===fid);
  const tb  = STATE.borrowers.find(b=>b.ID===tid);
  if(!fb||!tb){if(el)el.style.display='none';return;}
  if(el) el.style.display='block';
  if(body) body.innerHTML=`
    <div style="display:grid;gap:5px">
      <div style="display:flex;justify-content:space-between">
        <span>${fb.Name}:</span>
        <span><s style="opacity:.4">${fmtFull(fb.outstanding)}</s> → <strong style="color:#16a34a">${fmtFull(Math.max(0,fb.outstanding-amt))}</strong></span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span>${tb.Name}:</span>
        <span><s style="opacity:.4">${fmtFull(tb.outstanding)}</s> → <strong style="color:#dc2626">${fmtFull(tb.outstanding+amt)}</strong></span>
      </div>
    </div>`;
}

async function submitTransfer() {
  const fid   = document.getElementById('tr-from')?.value;
  const tid   = document.getElementById('tr-to')?.value;
  const amt   = parseFloat(document.getElementById('tr-amount')?.value);
  const date  = document.getElementById('tr-date')?.value;
  const notes = document.getElementById('tr-notes')?.value;

  if (!fid)           { showToast('Select the sender','error');   return; }
  if (!tid)           { showToast('Select the receiver','error'); return; }
  if (fid===tid)      { showToast('Cannot transfer to same borrower','error'); return; }
  if (!amt||amt<=0)   { showToast('Enter a valid amount','error'); return; }

  const fb = STATE.borrowers.find(b=>b.ID===fid);
  if (fb && amt > fb.outstanding+0.01) {
    showToast(`Amount exceeds ${fb.Name}'s outstanding (${fmtFull(fb.outstanding)})`,'error'); return;
  }

  const btn = document.getElementById('tr-btn');
  if (btn) { btn.disabled=true; btn.textContent='Processing…'; }
  try {
    await apiPost({action:'recordTransfer', fromBorrowerId:fid, toBorrowerId:tid, amount:amt, date, notes});
    showToast('Transfer complete! 🔄','success');
    await renderTransfers();
  } catch(e) {
    showToast(e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='🔄 Execute Transfer'; }
  }
}

    el.textContent='🎭 Demo Mode';
  } else {
    el.style.background='rgba(34,197,94,.2)'; el.style.color='#86efac';
    el.textContent='✅ Connected';
  }
}

// ══════════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display='none'; }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function showPaymentModal(borrowerId) {
  const b = STATE.borrowers.find(x=>x.ID===borrowerId);
  if (!b) return;
  showModal(`
    <div style="display:flex;justify-content:space-between;margin-bottom:18px">
      <div>
        <div style="font-size:17px;font-weight:700">💳 Record Payment</div>
        <div style="font-size:13px;color:#64748b">${b.Name}</div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
    </div>

    <div style="background:#fef2f2;border-radius:10px;padding:14px;margin-bottom:18px">
      <div style="font-size:11px;color:#64748b">Outstanding Balance</div>
      <div style="font-size:28px;font-weight:800;color:#dc2626">${fmtFull(b.outstanding)}</div>
      <div style="font-size:12px;color:#64748b">Monthly payment: ${fmtFull(b.stats.monthlyPayment)}</div>
    </div>

    <div style="margin-bottom:12px">
      <label class="label">Payment Amount *</label>
      <input class="input" id="pay-amount" type="number" min="0.01" step="0.01"
             value="${b.stats.monthlyPayment||''}" placeholder="Enter amount">
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn btn-sm btn-secondary" onclick="document.getElementById('pay-amount').value=${b.stats.monthlyPayment}">
        EMI ${fmtFull(b.stats.monthlyPayment)}</button>
      <button class="btn btn-sm btn-secondary" onclick="document.getElementById('pay-amount').value=${b.outstanding}">
        Full ${fmtFull(b.outstanding)}</button>
      <button class="btn btn-sm btn-secondary" onclick="document.getElementById('pay-amount').value=${r2(b.outstanding/2)}">
        Half</button>
    </div>

    <div style="margin-bottom:12px">
      <label class="label">Date</label>
      <input class="input" id="pay-date" type="date" value="${today()}">
    </div>
    <div style="margin-bottom:18px">
      <label class="label">Description</label>
      <input class="input" id="pay-desc" placeholder="e.g. Monthly EMI, Partial payment">
    </div>

    <button class="btn btn-success" style="width:100%" id="pay-btn" onclick="submitPayment('${borrowerId}')">
      ✅ Record Payment
    </button>
  `);
}

async function submitPayment(borrowerId) {
  const amt  = parseFloat(document.getElementById('pay-amount')?.value);
  const date = document.getElementById('pay-date')?.value;
  const desc = document.getElementById('pay-desc')?.value||'Payment received';
  if (!amt||amt<=0) { showToast('Enter a valid amount','error'); return; }
  const btn = document.getElementById('pay-btn');
  if (btn) { btn.disabled=true; btn.textContent='Processing…'; }
  try {
    await apiPost({action:'recordPayment', borrowerId, amount:amt, date, description:desc});
    closeModal();
    showToast('Payment recorded! ✅','success');
    STATE.borrowers = await apiGet('getBorrowers');
    if (STATE.view==='detail')     await renderDetail(borrowerId);
    else if (STATE.view==='dashboard') await renderDashboard();
    else drawBorrowersList();
  } catch(e) {
    showToast(e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='✅ Record Payment'; }
  }
}

function showTransferModal(fromId) {
  const from   = STATE.borrowers.find(b=>b.ID===fromId);
  const others = STATE.borrowers.filter(b=>b.ID!==fromId);
  showModal(`
    <div style="display:flex;justify-content:space-between;margin-bottom:18px">
      <div>
        <div style="font-size:17px;font-weight:700">🔄 Quick Transfer</div>
        <div style="font-size:13px;color:#64748b">From: ${from?.Name}</div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
    </div>
    <div style="margin-bottom:12px">
      <label class="label">Transfer To</label>
      <select class="input" id="qt-to">
        <option value="">— Select —</option>
        ${others.map(b=>`<option value="${b.ID}">${b.Name} (${fmtFull(b.outstanding)})</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:12px">
      <label class="label">Amount</label>
      <input class="input" id="qt-amount" type="number" min="1" placeholder="Amount to transfer">
    </div>
    <div style="margin-bottom:18px">
      <label class="label">Date</label>
      <input class="input" id="qt-date" type="date" value="${today()}">
    </div>
    <button class="btn btn-primary" style="width:100%" id="qt-btn" onclick="submitQuickTransfer('${fromId}')">
      🔄 Execute Transfer
    </button>
  `);
}

async function submitQuickTransfer(fromId) {
  const tid = document.getElementById('qt-to')?.value;
  const amt = parseFloat(document.getElementById('qt-amount')?.value);
  const dt  = document.getElementById('qt-date')?.value;
  if (!tid)           { showToast('Select recipient','error'); return; }
  if (!amt||amt<=0)   { showToast('Enter amount','error'); return; }
  const btn = document.getElementById('qt-btn');
  if (btn) { btn.disabled=true; btn.textContent='Processing…'; }
  try {
    await apiPost({action:'recordTransfer', fromBorrowerId:fromId, toBorrowerId:tid, amount:amt, date:dt});
    closeModal();
    showToast('Transfer complete!','success');
    STATE.borrowers = await apiGet('getBorrowers');
    if (STATE.view==='detail') await renderDetail(fromId);
    else drawBorrowersList();
  } catch(e) {
    showToast(e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='🔄 Execute Transfer'; }
  }
}

function confirmClose(id) {
  const b = STATE.borrowers.find(x=>x.ID===id);
  showModal(`
    <div style="text-align:center;padding:10px">
      <div style="font-size:40px;margin-bottom:12px">🔒</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Close Loan?</div>
      <div style="color:#64748b;font-size:14px;margin-bottom:22px">
        Mark <strong>${b?.Name}</strong>'s loan as closed.<br>
        Outstanding: <strong style="color:#dc2626">${fmtFull(b?.outstanding)}</strong>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="executeClose('${id}')">Close Loan</button>
      </div>
    </div>`);
}

async function executeClose(id) {
  await apiPost({action:'closeLoan',id});
  closeModal();
  showToast('Loan closed','success');
  STATE.borrowers = await apiGet('getBorrowers');
  navigate('borrowers');
}

function confirmDelete(id) {
  const b = STATE.borrowers.find(x=>x.ID===id);
  showModal(`
    <div style="text-align:center;padding:10px">
      <div style="font-size:40px;margin-bottom:12px">🗑️</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Delete Borrower?</div>
      <div style="color:#64748b;font-size:14px;margin-bottom:22px">
        <strong>${b?.Name}</strong> and all their transactions will be permanently removed.
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="executeDelete('${id}')">Delete</button>
      </div>
    </div>`);
}

async function executeDelete(id) {
  await apiPost({action:'deleteBorrower',id});
  closeModal();
  showToast('Deleted','success');
  STATE.borrowers = await apiGet('getBorrowers');
  navigate('borrowers');
}

// ══════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast toast-'+type;
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display='none', 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar')?.classList.toggle('open');
  document.getElementById('sidebar-overlay').style.display =
    document.getElementById('sidebar')?.classList.contains('open') ? 'block' : 'none';
}

function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay').style.display='none';
}

async function refreshData() {
  showToast('Refreshing…','info');
  STATE.borrowers = await apiGet('getBorrowers');
  STATE.summary   = await apiGet('getSummary');
  await renderView();
  showToast('Refreshed','success');
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  const mb = document.getElementById('menu-btn');
  if (mb) mb.style.display = window.innerWidth<=768 ? 'block' : 'none';
  updateConnStatus();
  navigate('dashboard');
});

window.addEventListener('resize', () => {
  const mb = document.getElementById('menu-btn');
  if (mb) mb.style.display = window.innerWidth<=768 ? 'block' : 'none';
  if (window.innerWidth>768) closeSidebar();
});
</script>
</body>
